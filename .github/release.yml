# Config for GitHub's "Generate release notes" API.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - skip-changelog
      - ignore
    # Exclude bots so they don't show up in changelog/contributors
    authors:
      - dependabot
      - dependabot[bot]
      - github-actions[bot]
      - renovate[bot]
      - renovate
  categories:
    - title: "## 🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "## 🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "## 📚 Documentation"
      labels:
        - documentation
        - docs
    - title: "## 🧰 Maintenance"
      labels:
        - chore
        - dependencies
    # Catch-all: PRs that don't match above (no label or other labels)
    - title: "## 📋 Other changes"
      labels:
        - "*"
